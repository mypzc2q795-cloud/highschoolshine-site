backend:
  name: github
  repo: mypzc2q795-cloud/highschoolshine-site
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "settings"
    label: "Site Settings"
    files:

      - name: "business"
        label: "Business Info"
        file: "data/business.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Service Area Description", name: "service_area", widget: "string" }
          - { label: "Response Time Note", name: "response_time", widget: "string" }
          - { label: "Instagram Handle (e.g. @highschoolshine)", name: "instagram_handle", widget: "string", required: false }
          - { label: "Instagram Link", name: "instagram_url", widget: "string", required: false }

      - name: "packages"
        label: "Package Pricing"
        file: "data/packages.json"
        fields:
          - label: "Refresh Detail"
            name: "refresh"
            widget: "object"
            fields:
              - { label: "Sedan Price", name: "sedan", widget: "number" }
              - { label: "SUV / Crossover Price", name: "suv", widget: "number" }
              - { label: "Truck / Large SUV Price", name: "truck", widget: "number" }
              - { label: "Estimated Time", name: "time", widget: "string" }
          - label: "Deluxe Detail"
            name: "deluxe"
            widget: "object"
            fields:
              - { label: "Sedan Price", name: "sedan", widget: "number" }
              - { label: "SUV / Crossover Price", name: "suv", widget: "number" }
              - { label: "Truck / Large SUV Price", name: "truck", widget: "number" }
              - { label: "Estimated Time", name: "time", widget: "string" }
          - label: "Pet Hair Add-On"
            name: "pet_hair"
            widget: "object"
            fields:
              - { label: "With Refresh ($)", name: "refresh_price", widget: "number" }
              - { label: "With Deluxe ($)", name: "deluxe_price", widget: "number" }

      - name: "membership"
        label: "Shine All The Time Membership"
        file: "data/membership.json"
        fields:
          - { label: "Sedan Price / month", name: "sedan", widget: "number" }
          - { label: "SUV / Crossover Price / month", name: "suv", widget: "number" }
          - { label: "Truck / Large SUV Price / month", name: "truck", widget: "number" }
          - { label: "Add-On Discount %", name: "discount_percent", widget: "number" }
          - label: "Benefits List"
            name: "benefits"
            widget: "list"
            fields:
              - { label: "Benefit Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }

      - name: "about"
        label: "About & Founder"
        file: "data/about.json"
        fields:
          - { label: "Founder Name", name: "founder_name", widget: "string" }
          - { label: "Founder Bio", name: "bio", widget: "text" }
          - { label: "Founder Photo (optional)", name: "photo", widget: "image", required: false }

  - name: "testimonials-gallery"
    label: "Testimonials & Gallery"
    files:

      - name: "testimonials"
        label: "Testimonials"
        file: "data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}} — {{fields.vehicle}}"
            fields:
              - { label: "Customer Name", name: "name", widget: "string" }
              - { label: "Vehicle", name: "vehicle", widget: "string", required: false }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Rating (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
              - { label: "Date", name: "date", widget: "datetime", required: false }

      - name: "gallery"
        label: "Our Work / Gallery"
        file: "data/gallery.json"
        fields:
          - label: "Photos"
            name: "images"
            widget: "list"
            summary: "{{fields.caption}}"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }

  - name: "site-content"
    label: "Website Text"
    files:

      - name: "content"
        label: "All Page Text"
        file: "data/content.json"
        fields:

          - label: "Hero (Top Banner)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlighted word)", name: "heading_main", widget: "string" }
              - { label: "Heading Highlighted Word", name: "heading_highlight", widget: "string" }
              - { label: "Heading (after highlighted word)", name: "heading_after", widget: "string" }
              - { label: "Lead Paragraph", name: "lead", widget: "text" }
              - { label: "Primary Button Text", name: "cta_primary", widget: "string" }
              - { label: "Secondary Button Text", name: "cta_secondary", widget: "string" }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Number", name: "num", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "Why Us Section"
            name: "why_us"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Services Section"
            name: "services"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }
              - label: "Refresh Package"
                name: "refresh"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Tag Line", name: "tag", widget: "string" }
                  - label: "Features"
                    name: "features"
                    widget: "list"
                    field: { label: "Feature", name: "feature", widget: "string" }
                  - { label: "Best For Note", name: "best_for", widget: "string" }
                  - { label: "Button Text", name: "cta", widget: "string" }
              - label: "Deluxe Package"
                name: "deluxe"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Tag Line", name: "tag", widget: "string" }
                  - { label: "Includes Note", name: "includes_note", widget: "string" }
                  - label: "Features"
                    name: "features"
                    widget: "list"
                    field: { label: "Feature", name: "feature", widget: "string" }
                  - { label: "Best For Note", name: "best_for", widget: "string" }
                  - { label: "Button Text", name: "cta", widget: "string" }
              - label: "Add-On Note"
                name: "upsell"
                widget: "object"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description (write {refresh_price} and {deluxe_price} where those prices should appear)", name: "description", widget: "text" }

          - label: "Membership Section"
            name: "membership_extra"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Intro Text", name: "intro", widget: "text" }

          - label: "Our Work / Gallery Section"
            name: "gallery_extra"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }

          - label: "Testimonials Section"
            name: "testimonials_extra"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "text" }

          - label: "Service Area Section"
            name: "area"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Cities / Areas"
                name: "cities"
                widget: "list"
                fields:
                  - { label: "City / Area Name", name: "name", widget: "string" }
                  - { label: "Status", name: "status", widget: "select", options: ["active", "soon"] }
              - { label: "Map Caption", name: "map_caption", widget: "string" }

          - label: "About Section"
            name: "about_extra"
            widget: "object"
            fields:
              - { label: "Pull Quote", name: "quote", widget: "text" }
              - { label: "Quote Attribution", name: "quote_attribution", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Highlight List"
                name: "list_items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "string" }

          - label: "Contact Section"
            name: "contact_extra"
            widget: "object"
            fields:
              - { label: "Eyebrow Text", name: "eyebrow", widget: "string" }
              - { label: "Heading (before highlight)", name: "heading", widget: "string" }
              - { label: "Heading Highlight", name: "heading_highlight", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Booking Note", name: "booking_note", widget: "string" }

          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Book Now Button Text", name: "book_now", widget: "string" }
